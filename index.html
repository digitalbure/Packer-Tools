<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="screen-orientation" content="portrait" />
    <meta name="orientation" content="portrait" />
    <title>Packer Tools</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="icon" type="image/png" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <script>
      (function() {
        // Instant PWA Manifest Router based on URL path/hash/search params
        var hash = window.location.hash || '';
        var search = window.location.search || '';
        var pathname = window.location.pathname || '';
        var manifestUrl = '/manifest.json';
        var themeColor = '#0a0a0c';

        if (hash.indexOf('scannerApp=true') > -1 || search.indexOf('scannerApp=true') > -1) {
          manifestUrl = '/manifest-scanner.json';
          themeColor = '#F27D26'; // High-visibility scanner amber
        } else if (hash.indexOf('kiosk') > -1 || pathname.indexOf('/kiosk') > -1) {
          manifestUrl = '/manifest-kiosk.json';
        }

        var link = document.querySelector('link[rel="manifest"]');
        if (link) link.setAttribute('href', manifestUrl);

        var themeMeta = document.querySelector('meta[name="theme-color"]');
        if (themeMeta) themeMeta.setAttribute('content', themeColor);

        var path = window.location.pathname;
        if (!window.location.hash && (path.startsWith('/gear/') || path.startsWith('/p/') || path.startsWith('/marketplace/') || path.startsWith('/list/'))) {
          window.location.replace(window.location.origin + '/#' + path + window.location.search);
        }
      })();

      // Defensive error handling for Vite chunk/module loading failures common on mobile caching
      window.addEventListener('error', function(e) {
        var isChunkError = false;
        if (e.message && (
          e.message.indexOf('Failed to fetch dynamically imported module') > -1 || 
          e.message.indexOf('Importing a module script failed') > -1 ||
          e.message.indexOf('chunk') > -1
        )) {
          isChunkError = true;
        } else if (e.target && (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK')) {
          var src = e.target.src || e.target.href || '';
          if (src && (src.indexOf('/assets/') > -1 || src.indexOf('vendor-') > -1)) {
            isChunkError = true;
          }
        }

        if (isChunkError) {
          console.warn('Packer Tools: Detected missing build asset or chunk loading error. Cleaning PWA cache & reloading...');
          // Prevent infinite reload loop
          var reloadKey = 'packer_last_chunk_reload';
          var lastReload = localStorage.getItem(reloadKey);
          var now = Date.now();
          if (!lastReload || (now - parseInt(lastReload, 10)) > 8000) {
            localStorage.setItem(reloadKey, now.toString());
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                }
                window.location.reload();
              }).catch(function() {
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        var isChunkError = false;
        var msg = e.reason && e.reason.message ? e.reason.message : '';
        if (msg && (
          msg.indexOf('Failed to fetch dynamically imported module') > -1 ||
          msg.indexOf('Importing a module script failed') > -1 ||
          msg.indexOf('chunk') > -1
        )) {
          isChunkError = true;
        }

        if (isChunkError) {
          console.warn('Packer Tools: Detected promise chunk loading failure. Cleaning PWA cache & reloading...');
          var reloadKey = 'packer_last_chunk_reload';
          var lastReload = localStorage.getItem(reloadKey);
          var now = Date.now();
          if (!lastReload || (now - parseInt(lastReload, 10)) > 8000) {
            localStorage.setItem(reloadKey, now.toString());
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(function(registrations) {
                for (var i = 0; i < registrations.length; i++) {
                  registrations[i].unregister();
                }
                window.location.reload();
              }).catch(function() {
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
