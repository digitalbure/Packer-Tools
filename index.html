<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Packer Tools</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      (function() {
        var path = window.location.pathname;
        if (!window.location.hash && (path.startsWith('/gear/') || path.startsWith('/p/') || path.startsWith('/marketplace/') || path.startsWith('/list/'))) {
          window.location.replace(window.location.origin + '/#' + path + window.location.search);
        }
      })();

      // Defensive error handling for Vite chunk/module loading failures common on mobile caching
      window.addEventListener('error', function(e) {
        var isChunkError = e.message && (
          e.message.indexOf('Failed to fetch dynamically imported module') > -1 || 
          e.message.indexOf('Importing a module script failed') > -1 ||
          e.message.indexOf('chunk') > -1
        );
        if (isChunkError) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (var i = 0; i < registrations.length; i++) {
                registrations[i].unregister();
              }
              window.location.reload();
            });
          } else {
            window.location.reload();
          }
        }
      }, true);

      window.addEventListener('unhandledrejection', function(e) {
        var isChunkError = e.reason && e.reason.message && (
          e.reason.message.indexOf('Failed to fetch dynamically imported module') > -1 ||
          e.reason.message.indexOf('Importing a module script failed') > -1 ||
          e.reason.message.indexOf('chunk') > -1
        );
        if (isChunkError) {
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              for (var i = 0; i < registrations.length; i++) {
                registrations[i].unregister();
              }
              window.location.reload();
            });
          } else {
            window.location.reload();
          }
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
