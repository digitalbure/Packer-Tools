<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Packer Tools</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a0c" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <script>
      (function() {
        var path = window.location.pathname;
        if (!window.location.hash && (path.startsWith('/gear/') || path.startsWith('/p/') || path.startsWith('/marketplace/') || path.startsWith('/list/'))) {
          window.location.replace(window.location.origin + '/#' + path + window.location.search);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
