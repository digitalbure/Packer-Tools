<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0c" />
      <stop offset="50%" stop-color="#121217" />
      <stop offset="100%" stop-color="#1c1c24" />
    </linearGradient>
    
    <!-- Neon Blue Accent Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#1d4ed8" />
    </linearGradient>
    
    <!-- Neon Emerald Accent Gradient -->
    <linearGradient id="emeraldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>

    <!-- Metallic/Silver Gradient -->
    <linearGradient id="metalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3f4f6" />
      <stop offset="100%" stop-color="#9ca3af" />
    </linearGradient>

    <!-- Drop Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Ground Canvas: Rounded Icon Container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="#27272a" stroke-width="4"/>

  <!-- Subtle Blueprint Tech Grid Background -->
  <g stroke="#ffffff" stroke-opacity="0.04" stroke-width="1">
    <line x1="64" y1="0" x2="64" y2="512" />
    <line x1="128" y1="0" x2="128" y2="512" />
    <line x1="192" y1="0" x2="192" y2="512" />
    <line x1="256" y1="0" x2="256" y2="512" />
    <line x1="320" y1="0" x2="320" y2="512" />
    <line x1="384" y1="0" x2="384" y2="512" />
    <line x1="448" y1="0" x2="448" y2="512" />

    <line x1="0" y1="64" x2="512" y2="64" />
    <line x1="0" y1="128" x2="512" y2="128" />
    <line x1="0" y1="192" x2="512" y2="192" />
    <line x1="0" y1="256" x2="512" y2="256" />
    <line x1="0" y1="320" x2="512" y2="320" />
    <line x1="0" y1="384" x2="512" y2="384" />
    <line x1="0" y1="448" x2="512" y2="448" />
  </g>

  <!-- Technical Inner Circular Target Ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#27272a" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#10b981" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Master Gear/Transit Case Graphic -->
  <g filter="url(#shadow)">
    <!-- Base Tray/Chassis of the Gear Case -->
    <path d="M 160 170 L 352 170 Q 372 170 372 190 L 372 322 Q 372 342 352 342 L 160 342 Q 140 342 140 322 L 140 190 Q 140 170 160 170 Z" fill="none" stroke="url(#metalGrad)" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Internal Compartment Dividers -->
    <line x1="256" y1="170" x2="256" y2="342" stroke="url(#metalGrad)" stroke-width="8" stroke-dasharray="16 12 4 12"/>
    <line x1="140" y1="256" x2="372" y2="256" stroke="url(#metalGrad)" stroke-width="8"/>

    <!-- Dynamic Neon Content (Active Tracking Nodes & Flow Paths) -->
    <!-- Top-Left Segment: Gear Node / Tracked circle -->
    <circle cx="198" cy="213" r="16" fill="url(#blueGrad)" filter="drop-shadow(0 0 8px rgba(59, 130, 246, 0.6))" />
    
    <!-- Top-Right Segment: Verified Checkmark -->
    <path d="M 296 214 L 310 228 L 334 200" fill="none" stroke="url(#emeraldGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="drop-shadow(0 0 8px rgba(16, 185, 129, 0.6))"/>
    
    <!-- Bottom-Left Segment: Barcode Visualizers -->
    <line x1="175" y1="290" x2="225" y2="290" stroke="#f3f4f6" stroke-width="4" stroke-dasharray="4 2 2 4 8 2"/>
    <line x1="175" y1="300" x2="225" y2="300" stroke="#9ca3af" stroke-width="4" stroke-dasharray="1 3 6 2"/>
    
    <!-- Bottom-Right Segment: QR Code/Barcode Grid tracker -->
    <rect x="294" y="278" rx="4" width="44" height="44" fill="none" stroke="url(#blueGrad)" stroke-width="4"/>
    <rect x="304" y="288" rx="1" width="24" height="24" fill="#2563eb" opacity="0.8"/>
    <rect x="309" y="293" width="14" height="14" fill="#ffffff" />
    <rect x="313" y="297" width="6" height="6" fill="#000044" />
  </g>

  <!-- Calibration Targets -->
  <line x1="256" y1="16" x2="256" y2="32" stroke="#10b981" stroke-width="4"/>
  <line x1="256" y1="480" x2="256" y2="496" stroke="#2563eb" stroke-width="4"/>
  <line x1="16" y1="256" x2="32" y2="256" stroke="#9ca3af" stroke-width="4"/>
  <line x1="480" y1="256" x2="496" y2="256" stroke="#9ca3af" stroke-width="4"/>

  <!-- Brand Typography -->
  <text x="256" y="58" font-family="monospace" font-size="12" font-weight="900" fill="#10b981" text-anchor="middle" letter-spacing="4">SYS.ONLINE</text>
  <text x="256" y="464" font-family="monospace" font-size="12" font-weight="900" fill="#2563eb" text-anchor="middle" letter-spacing="4">PACKER TOOLS</text>
</svg>
